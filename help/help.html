<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>说明书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "STKaiti", "KaiTi", "SimSun", serif;
            background: linear-gradient(135deg, #fdf6ec 0%, #f5e6d3 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        h1 {
            text-align: center;
            font-size: 32px;
            color: #8b3a3a;
            margin-bottom: 8px;
            letter-spacing: 6px;
        }
        .subtitle {
            text-align: center;
            color: #b8735a;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .carousel-wrapper {
            position: relative;
            max-width: 720px;
            margin: 0 auto;
        }
        .carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 15px 10px 20px;
            scrollbar-width: thin;
            scrollbar-color: #c9a07a #f5e6d3;
        }
        .carousel::-webkit-scrollbar {
            height: 6px;
        }
        .carousel::-webkit-scrollbar-track {
            background: #f5e6d3;
            border-radius: 3px;
        }
        .carousel::-webkit-scrollbar-thumb {
            background: #c9a07a;
            border-radius: 3px;
        }
        .card {
            flex: 0 0 260px;
            background: #fffcf5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(139, 58, 58, 0.12);
            border: 1px solid #ebd5c0;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(139, 58, 58, 0.18);
        }
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #ebd5c0;
        }
        .card-placeholder {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #fff;
        }
        .card-body {
            padding: 16px 18px 20px;
        }
        .card-body h3 {
            font-size: 18px;
            color: #6b2e2e;
            margin-bottom: 6px;
            font-weight: normal;
        }
        .card-body p {
            font-size: 13px;
            color: #a6785a;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 16px;
        }
        .btn-group button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #c9a07a;
            color: #fffcf5;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-group button:hover {
            background: #b8735a;
        }
    </style>
</head>
<body>
    <h1>· 雅 集 ·</h1>
    <p class="subtitle">— 国风 · 物语 —</p>

    <div class="carousel-wrapper">
        <div class="carousel" id="carousel">
            <!-- 卡片 1 -->
            <div class="card">
                <div class="card-placeholder" style="background: linear-gradient(135deg, #d4836d, #c0604a);">🏮</div>
                <div class="card-body">
                    <h3>灯笼</h3>
                    <p>朱红纱笼，烛影摇红。元宵佳节，万家灯火映长街。</p>
                </div>
            </div>
            <!-- 卡片 2 -->
            <div class="card">
                <div class="card-placeholder" style="background: linear-gradient(135deg, #c9a87c, #b89263);">🍵</div>
                <div class="card-body">
                    <h3>茶道</h3>
                    <p>一壶春雪，满室兰香。静坐烹茶，品味山水之韵。</p>
                </div>
            </div>
            <!-- 卡片 3 -->
            <div class="card">
                <div class="card-placeholder" style="background: linear-gradient(135deg, #a88b6e, #8b6f52);">🎋</div>
                <div class="card-body">
                    <h3>竹韵</h3>
                    <p>疏影横斜，清风徐来。虚怀若谷，君子之风。</p>
                </div>
            </div>
            <!-- 卡片 4 -->
            <div class="card">
                <div class="card-placeholder" style="background: linear-gradient(135deg, #d4a193, #c08070);">🌸</div>
                <div class="card-body">
                    <h3>花信</h3>
                    <p>桃之夭夭，灼灼其华。春风十里，不如花间一壶酒。</p>
                </div>
            </div>
            <!-- 卡片 5 -->
            <div class="card">
                <div class="card-placeholder" style="background: linear-gradient(135deg, #7a9a7a, #5c7a5c);">🏔</div>
                <div class="card-body">
                    <h3>山水</h3>
                    <p>远山如黛，近水含烟。水墨丹青，写不尽江山如画。</p>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button onclick="scrollCarousel(-1)">‹</button>
            <button onclick="scrollCarousel(1)">›</button>
        </div>
    </div>

    <script>
        function scrollCarousel(dir) {
            const el = document.getElementById('carousel');
            const card = el.querySelector('.card');
            const gap = 20;
            const step = (card ? card.offsetWidth + gap : 280);
            el.scrollBy({ left: dir * step, behavior: 'smooth' });
        }
    </script>
</body>
</html>
